<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>撥款key-in</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        /* --- 基礎設定 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: var(--primary-color);
        }

        :root {
            --primary-color: #2c3e50;
            /* 深藍色 */
            --accent-color: #2980b9;
            /* 藍色 */
            --bg-color: #dddddd;
            /* 淺灰綠色 */
            --highlight-bg: #fff3cd;
            /* 淺黃色 */
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* 修正：套用變數背景色 */
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* --- 版面佈局 (Part1 左右分割) --- */
        .part1 {
            display: flex;
            gap: 20px;
            /* 左右欄間距 */
        }

        .part1-left {
            width: 35%;
            /* 左側稍微寬一點 */
            display: flex;
            flex-direction: column;
            padding: 10px;
            background-color: #f9f9f9;
            /* 給左側一點背景區隔 */
            border-radius: 8px;
        }

        .part1-right {
            width: 65%;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* --- 左側表單樣式 --- */
        .part1 p {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .p1-font-w {
            width: 100px;
            margin-right: 10px;
            font-weight: bold;
            text-align: justify;
            text-align-last: justify;
            /* 強制分散對齊 */
        }

        input[type="date"],
        select,
        .p1-in1,
        .p1-in2 {
            padding: 8px;
            font-size: 16px;
            /* 字體大一點比較好閱讀 */
            border: 1px solid #ccc;
            border-radius: 4px;
            height: 45px;
            /* 讓輸入框填滿剩餘空間 */
            flex: 1;
            /* 配合 display: flex */
        }

        .p1-in3 {
            padding: 8px;
            font-size: 16px;
            /* 字體大一點比較好閱讀 */
            border: 1px solid #ccc;
            border-radius: 4px;
            height: 45px;
            /* 讓輸入框填滿剩餘空間 */
            width: 100%;
            /* 配合 display: flex */
        }

        /* --- 列表標題 (List Header) ★ 重要新增 --- */
        /* 這部分必須跟 .row-inputs 設定一模一樣的比例，標題才會對齊 */
        /* 1. 設定容器：Flex 佈局，確保標題列與輸入列結構一致 */
        .list-header,
        .row-inputs {
            display: flex;
            gap: 10px;
            /* 欄位間距固定 */
            width: 100%;
            align-items: center;
            padding: 0;
            /* 移除內距，避免計算誤差 */
        }

        /* 2. 標題文字內縮 (為了視覺上對齊輸入框內的文字起始點) */
        .list-header span {
            /* 輸入框 padding 是 8px + border 1px，所以標題設 9px 最準 */
            padding-left: 9px;
            box-sizing: border-box;
        }

        /* --- 3. 欄位寬度設定 (使用 flex 權重分配) --- */
        /* 加上 !important 是為了強制覆蓋 HTML 中可能殘留的 inline style */

        /* 第一欄：姓名 (權重 4) - 最寬 */
        .list-header span:nth-child(1),
        .row-inputs input.payee-name {
            flex: 4 !important;
            width: 0;
            /* 讓 flex 權重完全主導寬度 */
            min-width: 0;
            line-height: 35px;
            font-weight: bold;
        }

        /* 第二欄：金額 (權重 2.5) */
        .list-header span:nth-child(2),
        .row-inputs input.payee-amount {
            flex: 2.5 !important;
            width: 0;
            min-width: 0;
            line-height: 35px;
            font-weight: bold;
        }

        /* 第三欄：掃描費 (權重 2.5) - 與金額一樣寬 */
        .list-header span:nth-child(3),
        .row-inputs input.payee-scan {
            flex: 2.5 !important;
            width: 0;
            min-width: 0;
            line-height: 35px;
            font-weight: bold;
        }

        /* 第四欄：刪除按鈕 & 標題預留 (固定 60px) */
        /* 建議按鈕維持固定寬度，才不會因為螢幕變寬而變成巨型按鈕 */
        .list-header span:nth-child(4),
        .btn-delete {
            flex: 0 0 60px !important;
            /* 不伸縮，固定 60px */
            width: 60px !important;
        }

        /* 刪除按鈕的預留空間 */

        /* --- 掃描費標題的顯示邏輯 ★ 重要新增 --- */
        .scan-field-header {
            display: none;
            /* 預設隱藏 */
        }

        .show-scan .scan-field-header {
            display: block !important;
            /* 鑑定模式時顯示 */
        }

        /* --- 動態輸入列 (Row Inputs) --- */
        .row-inputs {
            display: flex;
            /* ★ 關鍵：必須設為 flex */
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            width: 100%;
        }

        .row-inputs input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 38px;
        }

        /* 欄位比例 (必須跟 .list-header 對應) */
        .row-inputs input.payee-name {
            flex: 2;
            min-width: 0;
            font-size: 16px;
            height: 40px;
            padding: 10px;
        }

        .row-inputs input.payee-amount {
            flex: 1;
            min-width: 0;
            font-size: 16px;
            height: 40px;
            padding: 10px;
        }

        .row-inputs input.payee-scan {
            flex: 1;
            min-width: 0;
            display: none;
            /* 預設隱藏 */
            font-size: 16px;
            height: 40px;
            padding: 10px;
        }

        /* 鑑定模式時顯示掃描費輸入框 */
        .show-scan .payee-scan {
            display: block !important;
        }

        /* --- 按鈕樣式 (Buttons) --- */
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-add-row {
            background-color: var(--accent-color);
            border: 1px solid var(--accent-color);
            color: white;
            margin-bottom: 20px;
            width: 100%;
            font-weight: bold;
            /* 讓按鈕填滿寬度 */
            font-size: 16px;
        }

        .btn-add-row:hover {
            background-color: white;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0;
            width: 60px;
            flex: none;
            height: 38px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-delete:hover {
            background-color: white;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .btn-save-batch {
            background-color: var(--accent-color);
            border: 1px solid var(--accent-color);
            color: white;
            flex: 1;
            font-weight: bold;
        }

        .btn-save-batch:hover {
            background-color: white;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .btn-submit {
            background-color: var(--accent-color);
            border-color: 1px solid var(--accent-color);
            color: white;
            flex: 1;
            height: 40px;
            font-weight: bold;
        }

        .btn-submit:hover {
            background-color: white;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .import {
            color: var(--primary-color);
            font-size: 0.9em;
            text-decoration: underline;
            cursor: pointer;
            /* transition: background-color 0.5s; */
        }

        .import:hover {
            background-color: var(--accent-color);
            color: white;
            /* font-size: 1.0em; */
            font-weight: bold;
        }

        .btn-back {
            background-color: var(--primary-color);
            color: white;
            /* margin-top: 20px; */
            flex: 1;
            height: 40px;
            border: 1px solid var(--primary-color);
            font-weight: bold;
        }

        .btn-back:hover {
            background-color: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .btn-excel {
            background-color: #217346;
            color: white;
            flex: 1;
            height: 40px;
            font-weight: bold;
        }

        .btn-excel:hover {
            background-color: white;
            color: #217346;
            border: 1px solid #217346;
        }

        /* 編輯模式按鈕變色 */
        .btn-save-batch.editing {
            background-color: #3498db;
        }

        /* --- 頁面控制 --- */
        .page {
            display: none;
        }

        .active {
            display: block;
        }

        /* --- 報表表格樣式 (Page 2) --- */
        .batch-container {
            margin-bottom: 40px;
            border: 1px solid #ccc;
            padding: 20px;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
        }

        .heji {
            color: var(--primary-color) !important;
            font-weight: bold;
            text-align: right;
            font-weight: bold
        }

        /* 表格內輸入框 */
        .edit-input {
            width: 100%;
            padding: 5px;
            border: 1px solid transparent;
            background: transparent;
            font-family: inherit;
            font-size: 0.95em;
        }

        .edit-input:hover,
        .edit-input:focus {
            border: 1px solid #aaa;
            background: #fff;
        }

        /* 合併儲存格樣式 */
        .merged-cell {
            background-color: #fff;
            text-align: center;
            font-weight: bold;
        }

        .name-cell {
            color: var(--primary-color);
            font-size: 1.1em;
        }

        .net-cell {
            color: #e67e22;
            font-size: 1.2em;
        }

        /* 合計/總計列 */
        .subtotal-row {
            background-color: #E5E7EA !important;
            font-weight: bold;
            color: #d35400;
            text-align: right;
        }

        .grand-total-row {
            background-color: #34495e;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
        }

        /* 暫存列表樣式 */
        .saved-list {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            background-color: #f9f9f9;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 10px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .saved-item-actions {
            display: flex;
            gap: 5px;
        }

        .btn-edit-item {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .btn-delete-item {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }

        /* 迷你編輯按鈕 (表格內) */
        .usage-cell-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-mini-edit {
            background-color: #95a5a6;
            color: white;
            border: none;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            padding: 0;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-mini-edit:hover {
            background-color: #7f8c8d;
        }

        /* 列印設定 */
        @media print {
            .container {
                box-shadow: none;
                border: none;
                width: 100%;
                max-width: 100%;
                padding: 0;
            }

            .btn-back,
            .btn-submit,
            .btn-save-batch,
            .btn-add-row,
            .btn-delete,
            .report-controls,
            .btn-excel,
            a,
            .btn-edit-item,
            .btn-delete-item,
            .btn-mini-edit {
                display: none;
            }

            .batch-container {
                border: none;
                border-bottom: 2px dashed #999;
                padding: 10px 0;
            }

            .edit-input {
                border: none;
                padding: 0;
            }
        }

        .datechooser select {
            padding: 8px;
            font-size: 16px;
            /* 字體大一點比較好閱讀 */
            border: 1px solid #ccc;
            border-radius: 4px;
            height: 80px;
            width: 100%;
            /* 讓輸入框填滿剩餘空間 */
            flex: 1;
            /* 配合 display: flex */
        }

        /* ========================================================
   新增樣式：報表金額對齊與輸入框美化
   ======================================================== */

        /* 1. 案件金額輸入框：文字靠右 */
        .amount-input {
            text-align: right;
        }

        /* 2. 稅額與健保費儲存格：核取方塊靠左、金額靠右 */
        .check-cell {
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* 關鍵：左右推開 */
            padding: 0 5px;
            /* 左右留點邊距比較好看 */
            height: 100%;
            /* 確保垂直置中 */
        }

        /* 確保裡面的數字也是靠右 */
        .val-tax,
        .val-health {
            text-align: right;
            flex: 1;
            /* 讓數字佔據剩餘空間 */
        }

        /* 3. 移除所有數字輸入框的上下微調按鈕 (Spin Buttons) */
        /* Chrome, Safari, Edge, Opera */
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* 強制讓 合計列 與 總計列 裡面的所有儲存格內容靠右對齊 */
        .subtotal-row td,
        .grand-total-row td {
            text-align: right !important;
            color: #ffffff;
        }

        /* 確保總計列的數字也是靠右 (以防萬一) */
        #grandList,
        #grandTax,
        #grandHealth {
            text-align: right;
        }

        /* =========================================
   自訂右鍵選單樣式
   ========================================= */
        .context-menu {
            display: none;
            position: absolute;
            z-index: 1000;
            width: 180px;
            background-color: #fff;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 5px 0;
        }

        .menu-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .menu-item:hover {
            background-color: #f0f0f0;
            color: #000;
        }

        /* 1. 確保容器相對定位，讓按鈕可以依據它定位 */
        .container {
            position: relative;
        }

        /* 2. 右上角按鈕 */
        .btn-top-right {
            position: absolute;
            top: 20px;
            right: 30px;
            background-color: white;
            /* 使用強調色 */
            color: var(--accent-color);
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            /* 圓角 */
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border: none;
            z-index: 10;
            /* 確保浮在最上層 */
            width: auto;
            /* 覆蓋全域 button 寬度設定 */
        }

        .btn-top-right:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        /* 3. 彈出視窗 (Modal) 背景 */
        .modal {
            display: none;
            /* 預設隱藏 */
            position: fixed;
            z-index: 2000;
            /* 比右鍵選單更高 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            /* 半透明黑底 */
            backdrop-filter: blur(2px);
            /* 背景模糊效果 */
        }

        /* 4. 彈出視窗內容框 */
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            /* 距離頂部 5% */
            padding: 0;
            border: 1px solid #888;
            width: 500px;
            /* 固定寬度 */
            max-width: 90%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 5. 視窗標題列 */
        .modal-header {
            padding: 15px 20px;
            background-color: var(--primary-color);
            color: white;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.2em;
        }

        .close-modal {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #ccc;
        }

        /* 6. 視窗內容區 */
        .modal-body {
            padding: 20px;
            max-height: 70vh;
            /* 防止內容太長超出螢幕 */
            overflow-y: auto;
            /* 內容太長出現捲軸 */
        }

        /* 7. 表格樣式 */
        .registry-table {
            width: 100%;
            border-collapse: collapse;
        }

        .registry-table th,
        .registry-table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .registry-table th {
            background-color: #f2f2f2;
            color: #333;
            font-weight: bold;
        }

        .registry-table tr:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

    <div class="container">
        <button type="button" class="btn-top-right" onclick="openRegistryModal()">
            🔍 查看簡稱對照表
        </button>
        <div id="page1" class="page active">
            <h2>撥款key-in</h2>
            <section class="part1">
                <div class="part1-left">
                    <p>
                        <label class="p1-font-w">撥款日期</label>
                        <input type="date" id="dateInput">
                    </p>
                    <p>
                        <label class="p1-font-w"> 類別一 </label>
                        <select id="cat1Input" onchange="handleCat1Change()"></select>
                    </p>
                    <p>
                        <label class="p1-font-w"> 類別二</label>
                        <select id="cat2Input" onchange="handleCat2Change()"></select>
                    </p>
                    <div id="extraNoteDiv" style="display:none;">
                        <p>
                            <label class="p1-font-w" id="extraNoteLabel">備註細項</label>
                            <input class="p1-in2" type="text" id="extraNoteInput" placeholder="請輸入..."
                                oninput="updateUsagePreview()">
                        </p>
                    </div>
                    <p>
                        <label class="p1-font-w">案號</label>
                        <input class="p1-in1" type="text" id="caseNoInput" placeholder="例如：112-001"
                            oninput="updateUsagePreview()">
                    </p>
                    <p>
                        <label class="p1-font-w">申請單位</label>
                        <input class="p1-in1" type="text" id="deptInput" placeholder="例如：〇〇營造"
                            oninput="updateUsagePreview()">
                    </p>
                    <div>
                        <label style="line-height: 30px; font-weight: bold;">▼ 本案用途 (可手動修改)</label><br>
                        <input class="p1-in3" type="text" id="usagePreview">
                    </div>
                </div>
                <div class="part1-right">
                    <div class="list-header">
                        <span class="payname">姓名</span>
                        <span class="payamount">金額</span>
                        <span class="payscan scan-field-header">掃描費</span>
                        <span class="btndel"></span>
                    </div>
                    <div id="dynamicRows"></div>
                    <div>

            "黃盈富, 智鼎": "智鼎工程顧問有限公司",
            "華傑": "華傑工程顧問有限公司",
        };

        // ★★★ 自動轉換邏輯 (程式會自動把上面的逗號拆開，變成一對一的對照表) ★★★
        const payeeRegistry = {}; // 這是給程式內部查表用的
        for (let [keys, fullName] of Object.entries(rawPayeeRegistry)) {
            // 依據逗號拆分，並去除前後空白
            keys.split(/,|，/).forEach(key => {
                const cleanKey = key.trim();
                if (cleanKey) {
                    payeeRegistry[cleanKey] = fullName;
                }
            });
        }

        let allBatches = [];
        let currentRightClickInput = null; // 暫存目前被按右鍵的輸入框

        // ==========================================
        // 2. 初始化與介面連動
        // ==========================================
        window.onload = function () {
            const dateInput = document.getElementById('dateInput');
            if (dateInput) dateInput.valueAsDate = new Date();
            initCategorySelects();
            addRow();

            // 點擊頁面其他地方時，關閉右鍵選單
            document.addEventListener('click', function () {
                document.getElementById('payeeContextMenu').style.display = 'none';
            });

            // ============================================================
            // ★★★ 新增：關閉視窗/重新整理前的防呆提示 ★★★
            // ============================================================
            window.addEventListener('beforeunload', function (e) {
                // 判斷條件：
                // 1. 暫存列表 (allBatches) 裡面有資料
                // 2. 或者，目前的輸入框 (payee-name) 裡面有打字還沒送出
                const currentInput = document.querySelector('.payee-name');
                const hasTyping = currentInput && currentInput.value.trim() !== "";

                if (allBatches.length > 0 || hasTyping) {
                    // 觸發瀏覽器預設的確認視窗
                    // (現代瀏覽器強制顯示預設文字，無法自訂訊息，這是瀏覽器的安全機制)
                    e.preventDefault();
                    e.returnValue = '';
                }
            });
        };

        function initCategorySelects() {
            const cat1Select = document.getElementById('cat1Input');
            cat1Select.innerHTML = '';
            for (let key in categoryData) {
                let option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                cat1Select.appendChild(option);
            }
            cat1Select.value = "鑑定";
            handleCat1Change();
        }

        // 當類別一改變時
        function handleCat1Change() {
            updateCat2Options(); // 更新子選單
            updateUIState();     // 更新介面顯示 (掃描費、備註框)
            updateUsagePreview();
        }

        // 當類別二改變時 (新增)
        function handleCat2Change() {
            updateUIState();     // 檢查是否選到了 "其他"，決定要不要顯示輸入框
            updateUsagePreview();
        }

        function updateCat2Options() {
            const cat1Value = document.getElementById('cat1Input').value;
            const cat2Select = document.getElementById('cat2Input');
            cat2Select.innerHTML = '';

            const subCategories = categoryData[cat1Value] || [];
            subCategories.forEach(sub => {
                let option = document.createElement('option');
                option.value = sub;
                option.textContent = sub;
                cat2Select.appendChild(option);
            });
        }

        // 統一管理介面顯示邏輯 (掃描費 & 備註框)
        function updateUIState() {
            const cat1Value = document.getElementById('cat1Input').value;
            const cat2Value = document.getElementById('cat2Input').value;
            const page1Div = document.getElementById('page1');
            const extraNoteDiv = document.getElementById('extraNoteDiv');
            const extraNoteLabel = document.getElementById('extraNoteLabel');
            const extraNoteInput = document.getElementById('extraNoteInput');

            // 1. 處理掃描費 (只有「鑑定」顯示)
            if (cat1Value === "鑑定") {
                page1Div.classList.add('show-scan');
            } else {
                page1Div.classList.remove('show-scan');
                const scanInputs = document.querySelectorAll('.payee-scan');
                scanInputs.forEach(input => input.value = '');
            }

            // 2. 處理「輸入分類二/備註」欄位
            if (cat1Value === "其他" || cat2Value === "其他") {
                extraNoteDiv.style.display = "block";
                if (cat1Value === "其他") {
                    extraNoteLabel.textContent = "備註說明";
                    extraNoteInput.placeholder = "請輸入雜支說明...";
                } else {
                    extraNoteLabel.textContent = "輸入分類二";
                    extraNoteInput.placeholder = "請輸入分類二細項...";
                }
            } else {
                extraNoteDiv.style.display = "none";
                extraNoteInput.value = "";
            }

            // ★★★ 新增邏輯：如果是「津貼」，隱藏案號與申請單位 ★★★
            const caseNoInput = document.getElementById('caseNoInput');
            const deptInput = document.getElementById('deptInput');

            // 使用 closest('p') 抓取包含 input 的整行 <p> 標籤
            const caseRow = caseNoInput.closest('p');
            const deptRow = deptInput.closest('p');

            if (cat1Value === "津貼") {
                // 隱藏
                caseRow.style.display = 'none';
                deptRow.style.display = 'none';
                // 清空數值，避免切換回來時殘留
                caseNoInput.value = '';
                deptInput.value = '';
            } else {
                // 顯示 (恢復原本的 flex 排版)
                caseRow.style.display = 'flex';
                deptRow.style.display = 'flex';
            }
        }

        // ==========================================
        // 3. 受款人自動完成與右鍵選單邏輯 (新增功能)
        // ==========================================

        // 當輸入框失去焦點時，檢查是否為簡稱
        function autoExpandPayee(input) {
            const val = input.value.trim();
            if (payeeRegistry[val]) {
                // 將原本輸入的簡稱存入 data attribute，方便之後還原
                input.setAttribute('data-short-name', val);
                input.value = payeeRegistry[val];
            }
        }

        // 顯示自訂右鍵選單
        function showContextMenu(e, input) {
            // 只有當該欄位有被自動轉換過(有存簡稱)，或者輸入框有值的時候才處理
            if (!input.getAttribute('data-short-name') && input.value === "") {
                return; // 如果是空的，使用預設右鍵選單
            }

            e.preventDefault(); // 阻止瀏覽器預設右鍵選單
            currentRightClickInput = input;

            const menu = document.getElementById('payeeContextMenu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        // 點擊選單項目：還原簡稱
        function revertToShortName() {
            if (currentRightClickInput) {
                const shortName = currentRightClickInput.getAttribute('data-short-name');
                if (shortName) {
                    currentRightClickInput.value = shortName;
                    // 清除標記，避免下次又自動轉換 (選擇性，若希望下次blur繼續轉則保留)
                    // 這裡邏輯是：既然使用者選擇還原，代表他這次就是想用簡稱
                }
            }
            document.getElementById('payeeContextMenu').style.display = 'none';
        }

        // ==========================================
        // 4. 核心邏輯
        // ==========================================
        function getFormattedCaseNo(caseNo, mainCat) {
            if (caseNo && caseNo.includes("-")) {
                const parts = caseNo.split("-");
                if (parts.length === 2) {
                    let middle = "";
                    if (mainCat === "鑑定") middle = "鑑";
                    else if (mainCat === "施工") middle = "施";
                    else if (mainCat === "耐震") middle = "耐";
                    else if (mainCat === "地敏") middle = "地";
                    else if (mainCat === "水保") middle = "水";
                    else if (mainCat === "房屋") middle = "房";
                    else if (mainCat === "結構") middle = "結";

                    if (middle) {
                        return `${parts[0]}${middle}${parts[1]}號`;
                    }
                }
            }
            return caseNo;
        }

        function getSuffix(subCat) {
            if (subCat === "耐震標章") return "(耐震標章)";
            const standardSuffixes = [
                "現況鑑定", "都市更新", "安全鑑定", "損害修復", "未報勘驗", "工程鑑估",
                "鄰房鑑定", "安全評估", "擋土支撐", "施工計畫", "監測報告",
                "初評", "危老初評", "詳評", "詳評審查", "危老詳評", "公安詳評",
                "地下水", "山崩地滑", "水保審查", "結構外審", "結構變更", "鑑定"
            ];
            if (standardSuffixes.includes(subCat)) {
                return `(${subCat})`;
            }
            if (subCat === "其他") return "(其他)";
            return "";
        }

        function updateUsagePreview() {
            const cat1 = document.getElementById('cat1Input').value;
            const cat2 = document.getElementById('cat2Input').value;
            const rawCaseNo = document.getElementById('caseNoInput').value.trim();
            const applicant = document.getElementById('deptInput').value.trim();
            const extraNote = document.getElementById('extraNoteInput').value.trim();

            let finalUsage = "";

            if (cat1 === "津貼") {
                // 如果選了喪葬津貼，顯示奠儀，否則顯示原來的類別名稱
                if (cat2 === "喪葬津貼") {
                    finalUsage = "奠儀";
                } else {
                    finalUsage = cat2;
                }
            }
            else if (cat1 === "其他") {
                finalUsage = extraNote ? extraNote : "雜支";
            }
            else {
                const fmtCaseNo = getFormattedCaseNo(rawCaseNo, cat1);
                if (cat1 === "房屋" && cat2 === "複審費") {
                    finalUsage = `${fmtCaseNo}複審費`;
                }
                else {
                    let suffix = getSuffix(cat2);
                    if (cat2 === "其他" && extraNote) {
                        suffix = `(${extraNote})`;
                    }
                    else if (cat1 === "鑑定" && extraNote) {
                        if (suffix.endsWith(")")) {
                            suffix = suffix.slice(0, -1) + "-" + extraNote + ")";
                        } else {
                            suffix = `(${extraNote})`;
                        }
                    }

                    const applicantPart = applicant ? `${applicant}` : "";
                    finalUsage = `${fmtCaseNo}執行所得-${applicantPart}${suffix}`;
                }
            }

            document.getElementById('usagePreview').value = finalUsage;
        }

        // ==========================================
        // 4. 表單與操作邏輯
        // ==========================================
        function handleEnter(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                addRow();
                setTimeout(() => {
                    const rows = document.querySelectorAll('.row-inputs');
                    rows[rows.length - 1].querySelector('.payee-name').focus();
                }, 50);
            }
        }

        function addRow(nameVal = "", amtVal = "", scanVal = "") {
            const container = document.getElementById('dynamicRows');
            const div = document.createElement('div');
            div.className = 'row-inputs';
            div.innerHTML = `
        <input type="text" placeholder="撥款人姓名" class="payee-name" value="${nameVal}" 
               onblur="autoExpandPayee(this)" oncontextmenu="showContextMenu(event, this)">
        <input type="number" placeholder="金額" class="payee-amount" value="${amtVal}" onkeydown="handleEnter(event)">
        <input type="number" placeholder="掃描費" class="payee-scan" value="${scanVal}">
        <button type="button" class="btn-delete" onclick="removeRow(this)">刪除</button>
    `;
            container.appendChild(div);
        }

        function removeRow(btn) {
            const row = btn.parentNode;
            const container = document.getElementById('dynamicRows');
            if (container.children.length > 1) {
                row.remove();
            } else {
                row.querySelector('.payee-name').value = '';
                row.querySelector('.payee-amount').value = '';
                row.querySelector('.payee-scan').value = '';
            }
        }

        // --- 存檔與更新 ---
        function saveCurrentBatch() {
            const date = document.getElementById('dateInput').value;
            const rawCaseNo = document.getElementById('caseNoInput').value.trim();
            const cat1 = document.getElementById('cat1Input').value;
            const cat2 = document.getElementById('cat2Input').value;
            const dept = document.getElementById('deptInput').value.trim();
            const extraNote = document.getElementById('extraNoteInput').value.trim();
            const usage = document.getElementById('usagePreview').value.trim();
            const editingId = document.getElementById('editingBatchId').value;

            if (!date) { alert("請選擇日期"); return; }

            if (!editingId) {
                if (cat1 !== "津貼" && cat1 !== "其他" && !rawCaseNo) {
                    alert("請輸入案號"); return;
                }
            }

            if (!usage) { alert("用途欄位空白"); return; }

            const names = document.querySelectorAll('.payee-name');
            const amounts = document.querySelectorAll('.payee-amount');
            const scans = document.querySelectorAll('.payee-scan');

            let batchPayees = [];
            let batchTotal = 0;
            const fmtCaseNo = getFormattedCaseNo(rawCaseNo, cat1);

            for (let i = 0; i < names.length; i++) {
                let n = names[i].value.trim();
                let a = parseFloat(amounts[i].value) || 0;
                let s = parseFloat(scans[i].value) || 0;

                if (n) {
                    // ==========================================
                    // ★★★ 自動判斷扣繳與健保邏輯 ★★★
                    // ==========================================
                    let autoTax = false;
                    let autoHealth = false;

                    if (cat1 === "津貼") {
                        // 1. 如果是津貼，一律不扣稅、不扣健保
                        autoTax = false;
                        autoHealth = false;
                    } else if (n.includes("公司") || n.includes("郵局") || n === "麗邦企業社") {
                        // 2. 如果名稱包含「公司」或「郵局」或等於「麗邦企業社」
                        autoTax = false;
                        autoHealth = false;
                    } else if (n.includes("事務所")) {
                        // 3. 如果名稱包含「事務所」
                        autoTax = true;
                        autoHealth = false;
                    } else {
                        // 4. 其他情況 (例如個人技師)
                        autoTax = true;
                        // 健保費：案件金額大於等於 20000 才要扣
                        autoHealth = (a >= 20000); 
                    }

                    batchPayees.push({
                        name: n,
                        amount: a,
                        scanFee: s,
                        incomeUsage: usage,
                        scanUsage: `${fmtCaseNo}掃描費`,
                        isTax: autoTax,
                        isHealth: autoHealth
                    });
                    batchTotal += a;
                    if (s > 0) batchTotal -= s;
                }
            }

            if (batchPayees.length === 0) {
                alert("請至少輸入一筆撥款人資料");
                return;
            }

            if (editingId) {
                const index = allBatches.findIndex(b => b.id == editingId);
                if (index !== -1) {
                    allBatches[index] = {
                        id: parseInt(editingId),
                        date: date,
                        cat1: cat1,
                        cat2: cat2,
                        rawCaseNo: rawCaseNo,
                        dept: dept,
                        extraNote: extraNote,
                        usage: usage,
                        payees: batchPayees,
                        total: batchTotal
                    };
                }
                document.getElementById('editingBatchId').value = "";
                const btnSave = document.getElementById('btnSaveBatch');
                btnSave.textContent = "⬇ 加入暫存列表 (輸入下一案)";
                btnSave.classList.remove('editing');
            } else {
                allBatches.push({
                    id: Date.now(),
                    date: date,
                    cat1: cat1,
                    cat2: cat2,
                    rawCaseNo: rawCaseNo,
                    dept: dept,
                    extraNote: extraNote,
                    usage: usage,
                    payees: batchPayees,
                    total: batchTotal
                });
            }

            renderSavedList();
            clearInputs();
        }

        function clearInputs() {
            document.getElementById('caseNoInput').value = '';
            document.getElementById('extraNoteInput').value = '';
            document.getElementById('usagePreview').value = '';

            const container = document.getElementById('dynamicRows');
            container.innerHTML = '';
            addRow();

            document.getElementById('caseNoInput').focus();
        }

        function editBatch(id) {
            const batch = allBatches.find(b => b.id === id);
            if (!batch) return;

            document.getElementById('dateInput').value = batch.date;
            document.getElementById('cat1Input').value = batch.cat1;
            updateCat2Options(); // 先填充 cat2
            document.getElementById('cat2Input').value = batch.cat2;

            updateUIState(); // 手動觸發狀態更新，確保備註欄位與掃描費顯示正確

            document.getElementById('caseNoInput').value = batch.rawCaseNo || "";
            document.getElementById('deptInput').value = batch.dept || "";
            document.getElementById('extraNoteInput').value = batch.extraNote || "";
            document.getElementById('usagePreview').value = batch.usage;

            const container = document.getElementById('dynamicRows');
            container.innerHTML = '';
            batch.payees.forEach(p => {
                addRow(p.name, p.amount, p.scanFee);
            });

            document.getElementById('editingBatchId').value = batch.id;
            const btnSave = document.getElementById('btnSaveBatch');
            btnSave.textContent = "💾 更新此案件資料";
            btnSave.classList.add('editing');

            window.scrollTo({ top: 0, behavior: 'smooth' });

            const dateInput = document.getElementById('dateInput');
            dateInput.style.backgroundColor = "#fff3cd";
            setTimeout(() => { dateInput.style.backgroundColor = ""; }, 1000);
        }

        function jumpToEditBatch(id) {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');
            editBatch(id);
            alert("已載入案件資料，請修改「撥款日期」或「內容」後，按下「更新」按鈕。");
        }

        function deleteBatch(id) {
            if (confirm("確定要刪除此筆暫存資料嗎？")) {
                allBatches = allBatches.filter(b => b.id !== id);
                renderSavedList();

                const editingId = document.getElementById('editingBatchId').value;
                if (editingId == id) {
                    clearInputs();
                    document.getElementById('editingBatchId').value = "";
                    const btnSave = document.getElementById('btnSaveBatch');
                    btnSave.textContent = "⬇ 加入暫存列表 (輸入下一案)";
                    btnSave.classList.remove('editing');
                }
            }
        }

        function renderSavedList() {
            const listDiv = document.getElementById('savedList');
            const container = document.getElementById('savedListContainer');
            document.getElementById('savedCount').innerText = allBatches.length;

            if (allBatches.length > 0) {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }

            listDiv.innerHTML = '';
            allBatches.forEach((batch, index) => {
                let item = document.createElement('div');
                item.className = 'saved-item';
                item.innerHTML = `
            <div style="flex:1">
                <span><strong>#${index + 1}</strong> ${batch.date} - ${batch.usage}</span><br>
                <span style="font-size:0.85em; color:#666;">$${batch.total.toLocaleString()} (${batch.payees.length}人)</span>
            </div>
            <div class="saved-item-actions">
                <button class="btn-edit-item" onclick="editBatch(${batch.id})">編輯</button>
                <button class="btn-delete-item" onclick="deleteBatch(${batch.id})">刪除</button>
            </div>
        `;
                listDiv.appendChild(item);
            });
        }

        // ==========================================
        // 5. 產生報表
        // ==========================================
        function generateFinalReport() {
            const currentName = document.querySelector('.payee-name').value;
            if (currentName && (allBatches.length === 0 || document.getElementById('editingBatchId').value)) {
                if (confirm("您目前的輸入尚未加入/更新暫存，是否執行？")) {
                    saveCurrentBatch();
                } else {
                    return;
                }
            } else if (allBatches.length === 0) {
                alert("目前沒有任何案件資料！");
                return;
            }

            updateReportDateSelect();
            renderReportForSelectedDate();

            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
        }

        function updateReportDateSelect() {
            const dates = [...new Set(allBatches.map(b => b.date))].sort();
            const select = document.getElementById('reportDateSelect');
            select.innerHTML = '';
            dates.forEach(d => {
                const option = document.createElement('option');
                option.value = d;
                option.text = d;
                select.appendChild(option);
            });
            if (dates.length > 0) {
                select.value = dates[dates.length - 1];
            }
        }

        function renderReportForSelectedDate() {

            const reportDiv = document.getElementById('reportContent');

            const targetBatches = allBatches.filter(b => b.date === selectedDate);

                        peopleMap[p.name].push({
                            usage: p.incomeUsage,
                            amount: p.amount,
                            type: 'income',
                            isTax: p.isTax,
                            isHealth: p.isHealth,
                            refBatchId: batch.id,
                            refPayeeIndex: pIndex
                        });
                    }
                    if (p.scanFee > 0) {
                        if (!peopleMap[p.name]) peopleMap[p.name] = [];
                        peopleMap[p.name].push({
                            usage: p.scanUsage,
                            amount: -p.scanFee,
                            type: 'scan',

                    const taxChecked = entry.isTax ? 'checked' : '';
                    const healthChecked = entry.isHealth ? 'checked' : '';

                    tableHtml += `<tr class="calc-row ${rowClass}" 
                data-name="${name}" 
                data-batch-id="${entry.refBatchId}"

                    if (index === 0) {
                        tableHtml += `
                    <td rowspan="${rowCount}" class="merged-cell name-cell">${name}</td>
                    <td rowspan="${rowCount}" class="merged-cell net-cell" id="merged-net-${name}">

                    </td>
                    <td>
                        <div class="check-cell">
                            <input type="checkbox" class="chk-tax" onchange="calculateRow(this)" ${disabledAttr} ${taxChecked}>
                            <span class="val-tax">0</span>
                        </div>
                    </td>
                    <td>
                        <div class="check-cell">
                            <input type="checkbox" class="chk-health" onchange="calculateRow(this)" ${disabledAttr} ${healthChecked}>
                            <span class="val-health">0</span>
                        </div>
                        <span class="val-net" style="display:none;">0</span>

                </tr>
            `;
                });

                tableHtml += `
            <tr class="subtotal-row" id="subtotal-${name}">

        function updateUsageData(input) {
            const row = input.closest('tr');
            const batchId = parseInt(row.getAttribute('data-batch-id'));
            const payeeIndex = parseInt(row.getAttribute('data-payee-index'));
            const type = row.getAttribute('data-type');
            const newVal = input.value;

            const batch = allBatches.find(b => b.id === batchId);
            if (batch && batch.payees[payeeIndex]) {
                if (type === 'income') {
                    batch.payees[payeeIndex].incomeUsage = newVal;
                } else if (type === 'scan') {
                    batch.payees[payeeIndex].scanUsage = newVal;
                }
            }
        }

        function calculateRow(element) {
            const row = element.closest('tr');
            const amountInput = row.querySelector('.amount-input');
            const chkTax = row.querySelector('.chk-tax');
            const chkHealth = row.querySelector('.chk-health');
            const spanTax = row.querySelector('.val-tax');
            const spanHealth = row.querySelector('.val-health');
            const spanNet = row.querySelector('.val-net');

            let amount = parseFloat(amountInput.value) || 0;

            let tax = 0;
            if (chkTax.checked && amount > 0) {
                tax = Math.round(amount * 0.1);
            }
            spanTax.textContent = tax > 0 ? tax : "0";

            let health = 0;
            if (chkHealth.checked && amount > 0) {
                health = Math.round(amount * 0.0211);
            }
            spanHealth.textContent = health > 0 ? health : "0";

            let net = amount - tax - health;
            spanNet.textContent = net;

            const name = row.getAttribute('data-name');
            updateSubtotal(name);

            // --- 同步寫回 allBatches ---
            const batchId = parseInt(row.getAttribute('data-batch-id'));
            const payeeIndex = parseInt(row.getAttribute('data-payee-index'));
            const type = row.getAttribute('data-type');

            const batch = allBatches.find(b => b.id === batchId);
            if (batch && batch.payees[payeeIndex]) {
                if (type === 'income') {
                    batch.payees[payeeIndex].amount = amount;
                    batch.payees[payeeIndex].isTax = chkTax.checked;
                    batch.payees[payeeIndex].isHealth = chkHealth.checked;
                } else if (type === 'scan') {
                    // 掃描費通常是負值，且無稅無健保，但如果介面上允許修改金額：
                    batch.payees[payeeIndex].scanFee = Math.abs(amount);
                }
            }
        }

        function updateSubtotal(name) {
            const rows = document.querySelectorAll(`.calc-row[data-name="${name}"]`);

            let sumListed = 0;
            let sumTax = 0;
            let sumHealth = 0;
            let sumNet = 0;

            rows.forEach(row => {
                sumListed += parseFloat(row.querySelector('.amount-input').value) || 0;
                sumTax += parseFloat(row.querySelector('.val-tax').textContent) || 0;
                sumHealth += parseFloat(row.querySelector('.val-health').textContent) || 0;
                sumNet += parseFloat(row.querySelector('.val-net').textContent) || 0;
            });

            const subRow = document.getElementById(`subtotal-${name}`);
            if (subRow) {
                subRow.querySelector('.sub-listed').textContent = sumListed.toLocaleString();
                subRow.querySelector('.sub-tax').textContent = sumTax.toLocaleString();
                subRow.querySelector('.sub-health').textContent = sumHealth.toLocaleString();
            }

            const mergedNetCell = document.getElementById(`merged-net-${name}`);
            if (mergedNetCell) {
                mergedNetCell.textContent = sumNet.toLocaleString();
            }

            updateGrandTotal();
        }

        function updateGrandTotal() {
            let grandList = 0;
            let grandTax = 0;
            let grandHealth = 0;

            document.querySelectorAll('.subtotal-row').forEach(row => {
                grandList += parseFloat(row.querySelector('.sub-listed').textContent.replace(/,/g, '')) || 0;
                grandTax += parseFloat(row.querySelector('.sub-tax').textContent.replace(/,/g, '')) || 0;
                grandHealth += parseFloat(row.querySelector('.sub-health').textContent.replace(/,/g, '')) || 0;
            });

            document.getElementById('grandList').textContent = grandList.toLocaleString();
            document.getElementById('grandTax').textContent = grandTax.toLocaleString();
            document.getElementById('grandHealth').textContent = grandHealth.toLocaleString();
        }

        function recalculateAll() {
            document.querySelectorAll('.amount-input').forEach(input => {
                calculateRow(input);
            });
        }

        function goBack() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');
        }

        // ==========================================
        // 6. 匯出 Excel (新增自訂檔名功能)
        // ==========================================
        function syncUiStateToDataModel() {
            const rows = document.querySelectorAll('.calc-row');
            rows.forEach(tr => {
                const batchId = parseInt(tr.getAttribute('data-batch-id'));
                const payeeIndex = parseInt(tr.getAttribute('data-payee-index'));
                const type = tr.getAttribute('data-type');
                const isTax = tr.querySelector('.chk-tax').checked;
                const isHealth = tr.querySelector('.chk-health').checked;

                const batch = allBatches.find(b => b.id === batchId);
                if (batch && batch.payees[payeeIndex]) {
                    if (type === 'income') {
                        batch.payees[payeeIndex].isTax = isTax;
                        batch.payees[payeeIndex].isHealth = isHealth;
                    }
                }
            });
        }

        function exportToExcel() {
            const dateStr = document.getElementById('reportDateSelect').value;
            if (!dateStr) { alert("無資料可匯出"); return; }

            syncUiStateToDataModel();

            const dateObj = new Date(dateStr);
            const rocYear = dateObj.getFullYear() - 1911;
            const titleText = `${rocYear}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日撥款`;

            const ws_data = [];
            // Index 0 (Excel 第 1 列): 大標題
            ws_data.push([titleText, null, null, null, null, null]);

            const targetBatches = allBatches.filter(b => b.date === dateStr);
            const peopleMap = {};

            // 整理資料
            targetBatches.forEach(batch => {
                batch.payees.forEach(p => {
                    if (p.amount !== 0) {
                        if (!peopleMap[p.name]) peopleMap[p.name] = [];
                        let tax = 0;
                        let health = 0;
                        if (p.isTax) tax = Math.round(p.amount * 0.1);
                        if (p.isHealth) health = Math.round(p.amount * 0.0211);

                        peopleMap[p.name].push({
                            usage: p.incomeUsage,
                            listed: p.amount,
                            tax: tax,
                            health: health,
                            date: batch.date,
                            isTax: p.isTax,
                            isHealth: p.isHealth
                        });
                    }

                    if (p.scanFee > 0) {
                        if (!peopleMap[p.name]) peopleMap[p.name] = [];
                        peopleMap[p.name].push({
                            usage: p.scanUsage,
                            listed: -p.scanFee,
                            tax: 0,
                            health: 0,
                            date: batch.date,
                            isTax: false,
                            isHealth: false
                        });
                    }
                });
            });

            const merges = [];
            // 合併大標題 (A1:F1)
            merges.push({ s: { r: 0, c: 0 }, e: { r: 0, c: 5 } });

            let currentDataIndex = 0; // 追蹤 ws_data 的最新索引位置
            
            // 記錄所有的小計列位址，以便最後組成「總計」的公式
            const subtotalCellsD = [];
            const subtotalCellsE = [];
            const subtotalCellsF = [];

            for (let [name, entries] of Object.entries(peopleMap)) {
                // 插入該人員的標題列
                ws_data.push(["明細資料", "金額", "用途", "案件金額", "10%扣繳", "健保費"]);
                currentDataIndex++;

                const startDataIndex = currentDataIndex + 1; 
                const startExcelRow = startDataIndex + 1;    

                entries.forEach((e, idx) => {
                    currentDataIndex++; 
                    const excelRow = currentDataIndex + 1; 

                    let taxCell = 0;
                    let healthCell = 0;
                    if (e.isTax) {
                        taxCell = { t: 'n', f: `ROUND(D${excelRow}*0.1, 0)`, v: e.tax };
                    }
                    if (e.isHealth) {
                        healthCell = { t: 'n', f: `ROUND(D${excelRow}*0.0211, 0)`, v: e.health };
                    }

                    if (idx === 0) {
                        ws_data.push([name, null, e.usage, e.listed, taxCell, healthCell]);
                    } else {
                        ws_data.push([null, null, e.usage, e.listed, taxCell, healthCell]);
                    }
                });

                const endExcelRow = currentDataIndex + 1; 

                // 填入該人員「總實付金額」的公式
                ws_data[startDataIndex][1] = { 
                    t: 'n', 
                    f: `SUM(D${startExcelRow}:D${endExcelRow})-SUM(E${startExcelRow}:F${endExcelRow})` 
                };

                // 設定該人員的 A欄 與 B欄 的合併儲存格
                if (entries.length > 1) {
                    merges.push({ s: { r: startDataIndex, c: 0 }, e: { r: currentDataIndex, c: 0 } });
                    merges.push({ s: { r: startDataIndex, c: 1 }, e: { r: currentDataIndex, c: 1 } });
                }

                // 產生該人員的「合計」列
                ws_data.push([
                    null, null, "合計", 
                    { t: 'n', f: `SUM(D${startExcelRow}:D${endExcelRow})` }, 
                    { t: 'n', f: `SUM(E${startExcelRow}:E${endExcelRow})` }, 
                    { t: 'n', f: `SUM(F${startExcelRow}:F${endExcelRow})` }
                ]);
                currentDataIndex++; 

                // 記錄此合計列的位置供大總計使用
                subtotalCellsD.push(`D${currentDataIndex + 1}`);
                subtotalCellsE.push(`E${currentDataIndex + 1}`);
                subtotalCellsF.push(`F${currentDataIndex + 1}`);
            }

            // 大總計
            const grandFormulaD = subtotalCellsD.length > 0 ? subtotalCellsD.join('+') : "0";
            const grandFormulaE = subtotalCellsE.length > 0 ? subtotalCellsE.join('+') : "0";
            const grandFormulaF = subtotalCellsF.length > 0 ? subtotalCellsF.join('+') : "0";

            ws_data.push([
                null, null, "總計", 
                { t: 'n', f: grandFormulaD }, 
                { t: 'n', f: grandFormulaE }, 
                { t: 'n', f: grandFormulaF }
            ]);

            // 產出 Sheet
            const ws = XLSX.utils.aoa_to_sheet(ws_data);

            // 設定樣式變數
            const fontStyle16 = { name: "標楷體", sz: 16, bold: true };
            const fontStyle12 = { name: "標楷體", sz: 12, bold: true };
            const currencyFmt = '"$"#,##0_ ;"-$"#,##0_ ; ';
            const thinBorder = {
                top: { style: "thin" },
                bottom: { style: "thin" },
                left: { style: "thin" },
                right: { style: "thin" }
            };

            // 設定欄寬
            ws['!cols'] = [
                { wch: 20.13 }, { wch: 21.25 }, { wch: 43.38 }, { wch: 17.5 }, { wch: 14.25 }, { wch: 11.88 }
            ];

            // 【新增需求 2】：設定列印範圍，將 A 到 F 欄（寬度）縮放至一頁印出
            ws['!pageSetup'] = { 
                fitToPage: true, 
                fitToWidth: 1, 
                fitToHeight: 0 // 0 代表高度不限制，資料多時可印多頁
            };

            // 套用樣式與格線迴圈
            const range = XLSX.utils.decode_range(ws['!ref']);
            // 確保尋訪範圍至少到 F 欄 (第 5 欄)
            range.e.c = Math.max(range.e.c, 5);
            ws['!ref'] = XLSX.utils.encode_range(range);

            for (let R = range.s.r; R <= range.e.r; ++R) {
                const isHeaderRow = (ws_data[R] && ws_data[R][0] === "明細資料");
                
                // 強制迴圈走訪 A 到 F 欄 (0 到 5)
                for (let C = 0; C <= 5; ++C) {
                    const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                    
                    // 【新增需求 1】：如果該格子是空的（例如合併儲存格補位的 null），強制建立空物件，才能畫框線
                    if (!ws[cell_address]) {
                        ws[cell_address] = { t: 's', v: "" }; 
                    }
                    if (!ws[cell_address].s) ws[cell_address].s = {};

                    // 畫上全部格線
                    ws[cell_address].s.border = thinBorder;
                    ws[cell_address].s.font = fontStyle16;
                    ws[cell_address].s.alignment = { vertical: "center" };

                    const val = ws[cell_address].v;

                    if (C === 0) {
                        ws[cell_address].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                    }
                    else if (C === 1) {
                        ws[cell_address].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                        if (ws[cell_address].t === 'n' || ws[cell_address].f) ws[cell_address].z = currencyFmt;
                    }
                    else if (C === 2) {
                        ws[cell_address].s.alignment = { shrinkToFit: true, wrapText: true, vertical: "center" };
                        if (val !== "用途" && val !== "合計" && val !== "總計" && val !== "") {
                            ws[cell_address].s.font = fontStyle12;
                        }
                        if (isHeaderRow || val === "用途") {
                            ws[cell_address].s.alignment.horizontal = "center";
                        }
                        if (val === "合計" || val === "總計") {
                            ws[cell_address].s.alignment.horizontal = "right";
                        }
                    }
                    else if (C >= 3) {
                        if (ws[cell_address].t === 'n' || ws[cell_address].f) ws[cell_address].z = currencyFmt;
                        ws[cell_address].s.alignment = { horizontal: "right", vertical: "center", wrapText: true };
                        if (isHeaderRow) {
                            ws[cell_address].s.alignment.horizontal = "center";
                        }
                    }
                }
            }

            if (ws['A1']) ws['A1'].s.alignment = { horizontal: "center", vertical: "center" };
            ws['!merges'] = merges;

            // ========================================================
            // ★★★ Sheet 2 & 3 & RawData ★★★
            // ========================================================

            // --- Sheet 2: 扣繳稅額表 ---
            const taxDataRaw = [];
            for (let [name, entries] of Object.entries(peopleMap)) {
                entries.forEach(e => {
                    if (e.tax > 0) {
                        const dObj = new Date(e.date);
                        const dateText = `${dObj.getMonth() + 1}月${dObj.getDate()}日`;
                        taxDataRaw.push({
                            usage: e.usage,
                            amount: e.listed,
                            tax: e.tax,
                            subtracted: e.listed - e.tax,
                            dateText: dateText,
                            name: name
                        });
                    }
                });
            }
            taxDataRaw.sort((a, b) => a.name.localeCompare(b.name, "zh-Hant"));
            const ws_tax_data = [];
            ws_tax_data.push(["用途", "金額", "10%扣繳", "小計", "撥款日期", "受款人姓名"]);
            taxDataRaw.forEach(item => {
                ws_tax_data.push([item.usage, item.amount, item.tax, item.subtracted, item.dateText, item.name]);
            });
            const ws_tax = XLSX.utils.aoa_to_sheet(ws_tax_data);
            ws_tax['!cols'] = [{ wch: 40 }, { wch: 15 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, { wch: 20 }];

            // --- Sheet 3: 二代健保 ---
            const healthMap = {};
            for (let [name, entries] of Object.entries(peopleMap)) {
                entries.forEach(e => {
                    if (e.health > 0) {
                        if (!healthMap[name]) healthMap[name] = { totalAmount: 0, totalHealth: 0 };
                        healthMap[name].totalAmount += e.listed;
                        healthMap[name].totalHealth += e.health;
                    }
                });
            }
            const ws_health_data = [["收款人", "金額加總", "健保費加總"]];
            for (let [name, val] of Object.entries(healthMap)) {
                ws_health_data.push([name, val.totalAmount, val.totalHealth]);
            }
            const ws_health = XLSX.utils.aoa_to_sheet(ws_health_data);
            ws_health['!cols'] = [{ wch: 20 }, { wch: 20 }, { wch: 20 }];

            // --- Sheet 4: Raw Data ---
            const rawData = [["BatchID", "Date", "Cat1", "Cat2", "RawCaseNo", "Dept", "ExtraNote", "PayeeName", "Amount", "ScanFee", "IncomeUsage", "ScanUsage", "IsTax", "IsHealth"]];
            allBatches.forEach(batch => {
                batch.payees.forEach(p => {
                    rawData.push([
                        batch.id, batch.date, batch.cat1, batch.cat2, batch.rawCaseNo || "", batch.dept || "", batch.extraNote || "",
                        p.name, p.amount, p.scanFee, p.incomeUsage, p.scanUsage,
                        p.isTax ? "TRUE" : "FALSE", p.isHealth ? "TRUE" : "FALSE"
                    ]);
                });
            });
            const wsRaw = XLSX.utils.aoa_to_sheet(rawData);

            // --- 組合與存檔 ---
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "撥款明細");
            XLSX.utils.book_append_sheet(wb, ws_tax, "扣繳稅額表");
            XLSX.utils.book_append_sheet(wb, ws_health, "二代健保表");
            XLSX.utils.book_append_sheet(wb, wsRaw, "RawData");

            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            let defaultFileName = `${rocYear}${month}${day}撥款明細.xlsx`;
            let userFileName = prompt("請確認檔案名稱 (直接按 Enter 即可存檔)：", defaultFileName);

            if (userFileName) {
                if (!userFileName.toLowerCase().endsWith(".xlsx")) {
                    userFileName += ".xlsx";
                }
                XLSX.writeFile(wb, userFileName);
            }
        }

        function importFromExcel(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                if (!workbook.Sheets["RawData"]) {
                    alert("錯誤：找不到 'RawData' 分頁，無法還原資料。");
                    return;
                }

                const rawJson = XLSX.utils.sheet_to_json(workbook.Sheets["RawData"]);
                const batchesMap = {};

                rawJson.forEach(row => {
                    const id = row.BatchID;
                    if (!batchesMap[id]) {
                        batchesMap[id] = {
                            id: id,
                            date: row.Date,
                            cat1: row.Cat1,
                            cat2: row.Cat2,
                            rawCaseNo: row.RawCaseNo,
                            dept: row.Dept,
                            extraNote: row.ExtraNote,
                            usage: row.IncomeUsage,
                            payees: [],
                            total: 0
                        };
                    }

                    const amount = parseFloat(row.Amount) || 0;
                    const scanFee = parseFloat(row.ScanFee) || 0;

                    const isTax = (String(row.IsTax).toUpperCase() === "TRUE");
                    const isHealth = (String(row.IsHealth).toUpperCase() === "TRUE");

                    batchesMap[id].payees.push({
                        name: row.PayeeName,
                        amount: amount,
                        scanFee: scanFee,
                        incomeUsage: row.IncomeUsage,
                        scanUsage: row.ScanUsage,
                        isTax: isTax,
                        isHealth: isHealth
                    });

                    batchesMap[id].total += amount;
                    if (scanFee > 0) batchesMap[id].total -= scanFee;
                });

                allBatches = Object.values(batchesMap);

                alert(`成功匯入 ${allBatches.length} 筆案件資料！`);
                generateFinalReport();
                input.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        // ==========================================
        // ★★★ 新增：彈出視窗控制邏輯 ★★★
        // ==========================================

        function openRegistryModal() {
            const modal = document.getElementById('registryModal');
            const tbody = document.getElementById('registryTableBody');
            const searchInput = document.getElementById('registrySearchInput');

            // 1. 每次打開時清空搜尋框
            searchInput.value = '';

            // 2. 清空並重建表格內容
            tbody.innerHTML = '';

            // ★★★ 修改點：讀取 rawPayeeRegistry (原始設定)，這樣顯示比較簡潔 ★★★
            const entries = Object.entries(rawPayeeRegistry);

            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#999;">目前尚無設定對照表</td></tr>';
            } else {
                entries.forEach(([short, full]) => {
                    // 為了美觀，將逗號統一換成漂亮的顯示格式
                    const displayShort = short.replace(/,/g, '<br><span style="color:#aaa; font-size:0.9em;">或者是</span> ');

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                <td style="font-weight:bold; color:#2c3e50;">${short}</td> <td>${full}</td>
            `;
                    tbody.appendChild(tr);
                });
            }

            // 3. 顯示視窗
            modal.style.display = "block";

            // 4. 自動聚焦
            setTimeout(() => {
                searchInput.focus();
            }, 100);
        }

        function closeRegistryModal() {
            document.getElementById('registryModal').style.display = "none";
        }

        function filterRegistryTable() {
            // 1. 取得輸入值並轉大寫 (不區分大小寫)
            const input = document.getElementById('registrySearchInput');
            const filter = input.value.toUpperCase();

            // 2. 取得所有表格列
            const tbody = document.getElementById('registryTableBody');
            const tr = tbody.getElementsByTagName('tr');

            // 3. 迴圈檢查每一列
            for (let i = 0; i < tr.length; i++) {
                // 取得該列的兩個欄位 (簡稱, 全稱)
                const tdShort = tr[i].getElementsByTagName("td")[0];
                const tdFull = tr[i].getElementsByTagName("td")[1];

                if (tdShort && tdFull) {
                    const txtShort = tdShort.textContent || tdShort.innerText;
                    const txtFull = tdFull.textContent || tdFull.innerText;

                    // 檢查是否包含關鍵字 (簡稱 OR 全稱 符合皆可)
                    if (txtShort.toUpperCase().indexOf(filter) > -1 || txtFull.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = ""; // 顯示
                    } else {
                        tr[i].style.display = "none"; // 隱藏
                    }
                }
            }
        }

        // 點擊視窗外部也可以關閉
        window.onclick = function (event) {
            const modal = document.getElementById('registryModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

    </script>
