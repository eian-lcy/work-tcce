<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>撥款key-in</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <!-- <button type="button" class="btn-top-right" onclick="openRegistryModal()">
            🔍 查看簡稱對照表
        </button> -->
        <div style="position: absolute; top: 20px; right: 30px; display: flex; gap: 10px; z-index: 1001;">
            <button type="button" class="btn-top-right" style="position: static;" onclick="openRegistryModal()">🔍
                查看簡稱對照表</button>
            <button type="button" class="btn-top-right" style="position: static;" onclick="toggleCalculator()">🧮
                開啟計算機</button>
        </div>

        <div id="calculator" class="floating-calc">
            <div id="calcHeader" class="calc-header">
                <span>計算機</span>
                <span onclick="toggleCalculator()" style="cursor:pointer;">&times;</span>
            </div>
            <div class="calc-body">
                <input type="text" id="calcDisplay" readonly>
                <div class="calc-buttons">
                    <button onclick="calcClear()">C</button>
                    <button onclick="calcBackspace()">←</button>
                    <button onclick="calcAppend('/')">/</button>
                    <button onclick="calcAppend('*')">*</button>
                    <button onclick="calcAppend('7')">7</button>
                    <button onclick="calcAppend('8')">8</button>
                    <button onclick="calcAppend('9')">9</button>
                    <button onclick="calcAppend('-')">-</button>
                    <button onclick="calcAppend('4')">4</button>
                    <button onclick="calcAppend('5')">5</button>
                    <button onclick="calcAppend('6')">6</button>
                    <button onclick="calcAppend('+')">+</button>
                    <button onclick="calcAppend('1')">1</button>
                    <button onclick="calcAppend('2')">2</button>
                    <button onclick="calcAppend('3')">3</button>
                    <button onclick="calcCalculate()"
                        style="grid-row: span 2; background: #2980b9; color: white;">=</button>
                    <button onclick="calcAppend('0')" style="grid-column: span 2;">0</button>
                    <button onclick="calcAppend('.')">.</button>
                </div>
            </div>
        </div>
        <div id="page1" class="page active">
            <h2>撥款key-in</h2>
            <section class="part1">
                <div class="part1-left">
                    <p>
                        <label class="p1-font-w">撥款日期</label>
                        <input type="date" id="dateInput">
                    </p>
                    <p>
                        <label class="p1-font-w"> 類別一 </label>
                        <select id="cat1Input" onchange="handleCat1Change()"></select>
                    </p>
                    <p>
                        <label class="p1-font-w"> 類別二</label>
                        <select id="cat2Input" onchange="handleCat2Change()"></select>
                    </p>
                    <div id="extraNoteDiv" style="display:none;">
                        <p>
                            <label class="p1-font-w" id="extraNoteLabel">備註細項</label>
                            <input class="p1-in2" type="text" id="extraNoteInput" placeholder="請輸入..."
                                oninput="updateUsagePreview()">
                        </p>
                    </div>
                    <p>
                        <label class="p1-font-w">案號</label>
                        <input class="p1-in1" type="text" id="caseNoInput" placeholder="例如：112-001"
                            oninput="updateUsagePreview()">
                    </p>
                    <p>
                        <label class="p1-font-w">申請單位</label>
                        <input class="p1-in1" type="text" id="deptInput" placeholder="例如：〇〇營造"
                            oninput="updateUsagePreview()" autocomplete="off">
                    </p>
                    <div>
                        <label style="line-height: 30px; font-weight: bold;">▼ 本案用途 (可手動修改)</label><br>
                        <input class="p1-in3" type="text" id="usagePreview">
                    </div>
                </div>
                <div class="part1-right">
                    <div class="list-header">
                        <span class="payname">姓名</span>
                        <span class="payamount">金額</span>
                        <span class="payscan scan-field-header">掃描費</span>
                        <span class="btndel"></span>
                    </div>
                    <div id="dynamicRows"></div>
                    <div>
                        <button type="button" class="btn-add-row" onclick="addRow()">+ 增加此案撥款人</button>
                        <input type="file" id="importFile" accept=".xlsx" style="display:none"
                            onchange="importFromExcel(this)">
                    </div>
                    <div class="action-buttons">
                        <button type="button" id="btnSaveBatch" class="btn-save-batch" onclick="saveCurrentBatch()">⬇
                            加入暫存列表 (輸入下一案)</button>
                        <button type="button" class="btn-submit" onclick="generateFinalReport()">完成，前往結算 ➤</button>
                    </div>

                    <input type="hidden" id="editingBatchId" value="">
                </div>
            </section>

            <div style="text-align: center; margin-top: 10px;">
                <a href="#" onclick="document.getElementById('importFile').click()" class="import">匯入 Excel 繼續編輯</a>
            </div>

            <div id="savedListContainer" style="display:none;">
                <h3>已暫存案件 (<span id="savedCount">0</span> 筆)</h3>
                <div id="savedList" class="saved-list"></div>
            </div>
        </div>

        <div id="page2" class="page">
            <h2>撥款清冊</h2>

            <div class="report-controls">
                <label for="reportDateSelect" style="line-height: 55px; font-weight: bold;">選擇撥款日期：</label>
                <select class="datechooser" id="reportDateSelect" onchange="renderReportForSelectedDate()"></select>
                <span style="flex:1"></span>
                <!-- <span style="color:#2980b9; font-size:0.9em;">(提示：可直接修改表格內容與勾選扣稅)</span> -->
            </div>

            <div id="reportContent"></div>

            <div class="action-buttons">
                <button type="button" class="btn-back" onclick="goBack()">返回新增/修改案件</button>
                <button type="button" class="btn-excel" onclick="exportToExcel()">📊 匯出 Excel</button>
                <button type="button" class="btn-submit" onclick="window.print()">列印 / 存成 PDF</button>
            </div>
        </div>
    </div>
    <div id="payeeContextMenu" class="context-menu">
        <div class="menu-item" onclick="revertToShortName()">
            ↩ 使用簡稱/還原輸入
        </div>
    </div>
    <div id="registryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>受款人簡稱對照表</h3>
                <span class="close-modal" onclick="closeRegistryModal()">&times;</span>
            </div>
            <div class="modal-body" style="padding: 20px; font-family: sans-serif;">

                <div style="margin-bottom: 20px;">
                    <input type="text" id="registrySearchInput" placeholder="🔍 搜尋簡稱或全稱..."
                        onkeyup="filterRegistryTable()"
                        style="width: 100%; padding: 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; transition: all 0.3s;">
                </div>

                <div
                    style="background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);">
                    <h4
                        style="margin-top: 0; margin-bottom: 8px; color: #495057; font-size: 16px; display: flex; align-items: center; gap: 6px;">
                        <span>➕ 添加新對照</span>
                    </h4>
                    <p style="margin: 0 0 15px 0; font-size: 13px; color: #6c757d;">💡 <strong
                            style="color: #007bff;">多簡稱輸入技巧：</strong>若一間公司有多個簡稱，請用<strong
                            style="color: #dc3545;">「頓號、」或「逗號,」</strong>隔開即可（例如：一品、宋介文）。</p>

                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                            <input type="text" id="newShortName" placeholder="輸入簡稱 (如：王錦智、詠新)"
                                style="flex: 1; min-width: 200px; padding: 10px 14px; font-size: 14px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box;">
                            <input type="text" id="newFullName" placeholder="輸入完整公司全稱 (如：詠新工程顧問有限公司)"
                                style="flex: 1; min-width: 250px; padding: 10px 14px; font-size: 14px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box;">
                        </div>
                        <button onclick="handleAddCompany()"
                            style="width: 100%; padding: 12px; font-size: 15px; font-weight: bold; color: #fff; background-color: #007bff; border: none; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; box-shadow: 0 2px 4px rgba(0,123,255,0.2);">
                            確認儲存至雲端資料庫
                        </button>
                    </div>
                </div>

                <div style="max-height: 400px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px;">
                    <table class="registry-table"
                        style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                        <thead style="background-color: #e9ecef; position: sticky; top: 0; z-index: 10;">
                            <tr>
                                <th style="padding: 12px 15px; width: 35%; color: #495057;">收件人簡稱</th>
                                <th style="padding: 12px 15px; width: 40%; color: #495057;">對應官方全稱</th>
                                <th style="padding: 12px 15px; width: 25%; text-align: center; color: #495057;">操作
                                </th>
                            </tr>
                        </thead>
                        <tbody id="registryTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- <div class="modal-body">
                <div style="margin-bottom: 15px;">
                    <input type="text" id="registrySearchInput" placeholder="🔍 搜尋簡稱或全稱..."
                        onkeyup="filterRegistryTable()"

                <div style="margin-top: 15px; border-top: 1px solid #ccc; padding-top: 15px;">

                    <button onclick="handleAddCompany()">新增</button>
                </div>
                <table class="registry-table">

                            <th width="40%">簡稱</th>

                    </tbody>
                </table>
            </div> -->
        </div>
    </div>

    <script src="payee-registry.js"></script>
    <script src="excel-export.js"></script>
    <script src="script.js"></script>
</body>

</html>
